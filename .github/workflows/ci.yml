name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: python -m pip install uv
      - name: Create development environment
        run: uv sync --extra dev
      - name: Test
        run: uv run pytest
      - name: Type check
        run: uv run pyright
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Cython lint
        run: uv run cython-lint --max-line-length 100 src/chronowire/*.pyx src/chronowire_reference/*.pyx
      - name: C++ warnings as errors
        run: >-
          c++ -std=c++17 -Wall -Wextra -Wpedantic -Wconversion -Wsign-conversion -Werror
          -fsyntax-only src/chronowire/cpp_runtime.cpp
      - name: Build distributions
        run: uv build
