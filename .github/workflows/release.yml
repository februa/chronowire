name: Release to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  version-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Reject pre-v1 PyPI publication
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import re

          tag = os.environ["RELEASE_TAG"]
          if re.fullmatch(r"v[1-9][0-9]*\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)", tag) is None:
              raise SystemExit("PyPI publication requires a stable v1.0.0 or later tag")
          PY

  build:
    needs: version-gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Verify release tag and package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["RELEASE_TAG"]
          if tag != f"v{version}":
              raise SystemExit(f"release tag {tag!r} does not match package version {version!r}")
          PY
      - name: Build distributions
        run: python -m pip install --upgrade build && python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
